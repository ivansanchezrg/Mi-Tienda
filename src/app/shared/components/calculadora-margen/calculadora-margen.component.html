<div class="bs-root">

  <div class="bs-header">
    <div class="bs-header__icon">
      <ion-icon name="calculator-outline"></ion-icon>
    </div>
    <span class="bs-header__title">Calc. Margen</span>
    <button class="bs-header__close" (click)="cerrar()">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="bs-content">
    <div class="bs-body">

      <!-- Inputs -->
      <div class="calc-inputs">
        <div class="calc-field">
          <label class="calc-label">Costo ($)</label>
          <input
            #costoInput
            class="calc-input"
            type="number"
            inputmode="decimal"
            placeholder="0.00"
            [(ngModel)]="costo"
            (ngModelChange)="onCostoChange()"
            min="0">
        </div>

        <div class="calc-field">
          <label class="calc-label">Precio de venta ($)</label>
          <input
            class="calc-input destacado"
            type="number"
            inputmode="decimal"
            placeholder="0.00"
            [(ngModel)]="precioVenta"
            (ngModelChange)="onPrecioVentaChange()"
            min="0">
        </div>
      </div>

      <!-- Margen de ganancia -->
      @if (costo && costo > 0) {
      <div class="margen-section">
        <span class="margen-label">Margen de ganancia</span>
        <span class="margen-valor" [class.danger]="margenColor === 'danger'" [class.warning]="margenColor === 'warning'" [class.success]="margenColor === 'success'">{{ margenPct }}%</span>
      </div>
      }

      <!-- Resultado -->
      @if (costo && precioVenta && precioVenta > 0) {
      <div class="resultado-card" [class.danger-card]="margenColor === 'danger'" [class.warning-card]="margenColor === 'warning'" [class.success-card]="margenColor === 'success'">
        <div class="resultado-row">
          <span class="resultado-label">Ganancia</span>
          <span class="resultado-valor">{{ ganancia }}</span>
        </div>
        <div class="resultado-row">
          <span class="resultado-label">{{ margenLabel }}</span>
          <span class="resultado-badge" [class.danger]="margenColor === 'danger'" [class.warning]="margenColor === 'warning'" [class.success]="margenColor === 'success'">{{ margenPct }}% margen</span>
        </div>
      </div>
      }

    </div>
  </div>

  <!-- Botones -->
  <div class="bs-actions bs-actions--compact">
    <ion-button fill="solid" color="success" (click)="limpiar()">Limpiar</ion-button>
  </div>

</div>
