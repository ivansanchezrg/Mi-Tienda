<div class="bs-root">

  <div class="bs-header">
    <div class="bs-header__icon">
      <ion-icon name="calculator-outline"></ion-icon>
    </div>
    <span class="bs-header__title">Calculadora de margen</span>
    <button class="bs-header__close" (click)="cerrar()">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="bs-content">
    <div class="bs-body">

      <!-- Inputs -->
      <div class="calc-inputs">
        <div class="calc-field">
          <label class="calc-label">Costo ($)</label>
          <input
            #costoInput
            class="calc-input"
            type="number"
            inputmode="decimal"
            placeholder="0.00"
            [(ngModel)]="costo"
            (ngModelChange)="onCostoChange()"
            min="0">
        </div>

        @if (costo && costo > 0) {
        <div class="calc-field">
          <label class="calc-label">Precio de venta ($)</label>
          <input
            class="calc-input destacado"
            type="text"
            inputmode="decimal"
            placeholder="0.00"
            [(ngModel)]="precioVenta"
            (ngModelChange)="onPrecioVentaChange()"
            (blur)="onPrecioBlur()">
        </div>
        }
      </div>

      <!-- Resultado -->
      @if (costo && costo > 0 && precioVentaNum > 0) {
      <div class="resultado-card" [class.danger-card]="margenColor === 'danger'" [class.warning-card]="margenColor === 'warning'" [class.success-card]="margenColor === 'success'">
        <div class="resultado-cols">
          <div class="resultado-col">
            <span class="resultado-col-label">Ganancia</span>
            <span class="resultado-col-valor">{{ ganancia }}</span>
          </div>
          <div class="resultado-col-divider"></div>
          <div class="resultado-col">
            <span class="resultado-col-label">Margen</span>
            <span class="resultado-col-valor" [class.danger]="margenColor === 'danger'" [class.warning]="margenColor === 'warning'" [class.success]="margenColor === 'success'">{{ margenPct }}%</span>
          </div>
        </div>
        <span class="resultado-tag" [class.danger]="margenColor === 'danger'" [class.warning]="margenColor === 'warning'" [class.success]="margenColor === 'success'">{{ margenLabel }}</span>
      </div>
      }

    </div>
  </div>

  <!-- Herramienta reactiva: la ✕ cierra; única acción = limpiar (patrón --compact de CLAUDE.md) -->
  <div class="bs-actions bs-actions--compact">
    <ion-button color="success" (click)="limpiar()">Nueva consulta</ion-button>
  </div>

</div>
