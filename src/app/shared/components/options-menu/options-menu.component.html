<!-- Botón disparador ⋮ — stopPropagation evita que el click burbujee al contenedor padre -->
<ion-button [id]="triggerId" fill="clear" [color]="triggerColor" [class.disabled-menu]="disabled"
    (click)="$event.stopPropagation()">
    <ion-icon slot="icon-only" name="ellipsis-vertical-outline"></ion-icon>
</ion-button>

<!-- Popover — dropdown desde el borde inferior del trigger hacia abajo-izquierda -->
<ion-popover [trigger]="disabled ? undefined : triggerId" triggerAction="click"
    side="bottom" alignment="end" [dismissOnSelect]="false">
    <ng-template>
        <div class="menu-popover">
            <div class="menu-options">
                @for (option of options; track option.value) {
                    @if (option.separator) {
                        <div class="menu-divider"></div>
                    } @else {
                        <button class="menu-option" [class.menu-option--danger]="option.color === 'danger'"
                            (click)="onSelect(option, $event)">
                            <div class="menu-option__icon" [class.menu-option__icon--danger]="option.color === 'danger'">
                                <ion-icon [name]="option.icon"></ion-icon>
                            </div>
                            <span class="menu-option__label">{{ option.label }}</span>
                            @if (option.active) {
                                <ion-icon name="checkmark-outline" class="menu-option__check"></ion-icon>
                            }
                        </button>
                    }
                }
            </div>
        </div>
    </ng-template>
</ion-popover>
