<!-- Header del Menú con info del usuario -->
<div class="menu-header">
  <ion-avatar class="menu-avatar">
    <ion-icon [icon]="userIcon"></ion-icon>
  </ion-avatar>
  <h3>{{ empleadoNombre }}</h3>
  <span class="menu-role">{{ empleadoRol === 'ADMIN' ? 'Administrador' : 'Empleado' }}</span>
</div>

<!-- Items del Menú -->
<ion-list lines="none" class="menu-list">
  <ion-menu-toggle *ngFor="let item of menuItems" auto-hide="false">
    <ion-item button class="menu-item" [routerLink]="item.url" routerLinkActive="active-item"
      [routerLinkActiveOptions]="{exact: !!item.exact}" (click)="closeMenu()">
      <ion-icon [icon]="item.icon" slot="start"></ion-icon>
      <ion-label>{{ item.title }}</ion-label>
    </ion-item>
  </ion-menu-toggle>
</ion-list>

<!-- Footer con Settings y Logout -->
<div class="menu-footer">
  <div class="footer-actions">
    <ion-button fill="clear" class="btn-logout" color="medium" (click)="logout()">
      <ion-icon [icon]="logoutIcon" slot="start"></ion-icon>
      Cerrar Sesión
    </ion-button>

    @if (empleadoRol === 'ADMIN') {
    <ion-button fill="clear" color="medium" class="btn-settings" [routerLink]="'/configuracion'" (click)="closeMenu()">
      <ion-icon [icon]="settingsIcon" slot="icon-only"></ion-icon>
    </ion-button>
    }
  </div>
</div>
