<div class="modal-wrapper">

  <div class="modal-header">
    <div class="modal-header-icon">
      <ion-icon name="storefront-outline"></ion-icon>
    </div>
    <span class="modal-header-title">Nueva sucursal</span>
    <button class="modal-close-btn" (click)="cerrar()">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="modal-body">
    <div class="field-group" [class.field-group--error]="nombreInvalido">
      <label class="field-label">Nombre de la sucursal</label>
      <input
        class="field-input"
        type="text"
        placeholder="Ej: Tienda Norte"
        [(ngModel)]="nombre"
        (blur)="touched = true"
        maxlength="100"
        autocomplete="off">
      @if (nombreInvalido) {
        <span class="field-error">El nombre es obligatorio</span>
      }
    </div>
  </div>

  <div class="modal-actions modal-actions--row">
    <ion-button expand="block" fill="outline" color="medium" (click)="cerrar()" [disabled]="guardando">
      Cancelar
    </ion-button>
    <ion-button expand="block" color="primary" (click)="confirmar()" [disabled]="guardando">
      @if (guardando) {
        <ion-spinner name="crescent" slot="start"></ion-spinner>
        Creando...
      } @else {
        Crear
      }
    </ion-button>
  </div>

</div>
