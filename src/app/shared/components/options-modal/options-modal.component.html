<div class="modal-handle"></div>

<div class="modal-header">
    <h2 class="modal-title">{{ title }}</h2>
    @if (subtitle) {
    <p class="modal-subtitle">{{ subtitle }}</p>
    }
</div>

<div class="modal-body">
    @for (group of groups; track group.title) {
    @if (group.title) {
    <div class="group-title">{{ group.title }}</div>
    }
    <div class="options-list">
        @for (opt of group.options; track opt.value) {
        <button class="option-item"
            [class.destructive]="opt.color === 'danger'"
            [class.selected]="selectedValue === opt.value"
            (click)="seleccionar(opt)">
            @if (opt.icon) {
            <div class="option-icon" [class.danger]="opt.color === 'danger'">
                <ion-icon [name]="opt.icon"></ion-icon>
            </div>
            }
            <div class="option-content">
                <span class="option-label">{{ opt.label }}</span>
                @if (opt.subtitle) {
                <span class="option-subtitle">{{ opt.subtitle }}</span>
                }
            </div>
            @if (selectedValue === opt.value) {
            <ion-icon name="checkmark-outline" class="option-check"></ion-icon>
            }
        </button>
        }
    </div>
    }
</div>
