<div class="filter-bar">
  @if (label) {
    <span class="filter-label">{{ label }}</span>
  }
  <div class="filter-tabs" [class.no-label]="!label">
    @for (opt of options; track opt.value) {
      <button
        class="filter-tab"
        [class.active]="selected === opt.value"
        (click)="onSelect(opt.value)">
        {{ opt.label }}
      </button>
    }
  </div>
</div>
