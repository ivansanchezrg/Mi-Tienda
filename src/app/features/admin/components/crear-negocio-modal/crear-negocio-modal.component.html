<div class="modal-wrapper">

  <div class="modal-header">
    <div class="modal-header-icon">
      <ion-icon name="storefront-outline"></ion-icon>
    </div>
    <span class="modal-header-title">Nuevo negocio</span>
    <button class="modal-close-btn" (click)="cancelar()" type="button">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="crear()" novalidate>

    <div class="field-wrap">
      <label class="field-label" for="nombre-negocio">Nombre del negocio</label>
      <input
        id="nombre-negocio"
        type="text"
        class="field-input"
        [class.field-input--error]="errorNombre"
        formControlName="nombre"
        placeholder="Ej: Sucursal Norte"
        autocomplete="organization"
        maxlength="80"
        enterkeyhint="next"
      />
      @if (errorNombre) {
        <p class="field-error">{{ errorNombre }}</p>
      }
    </div>

    <div class="field-wrap">
      <label class="field-label" for="admin-email">Email del administrador</label>
      <input
        id="admin-email"
        type="email"
        class="field-input"
        [class.field-input--error]="errorAdminEmail"
        formControlName="admin_email"
        placeholder="Ej: admin@negocio.com"
        autocomplete="email"
        maxlength="100"
        enterkeyhint="go"
        (keydown.enter)="crear()"
      />
      @if (errorAdminEmail) {
        <p class="field-error">{{ errorAdminEmail }}</p>
      }
      <p class="field-hint">El usuario deberá iniciar sesión con este email para gestionar el negocio.</p>
    </div>

    <div class="modal-actions modal-actions--row">
      <ion-button expand="block" fill="outline" color="medium" (click)="cancelar()" [disabled]="creando">
        Cancelar
      </ion-button>
      <ion-button expand="block" color="primary" (click)="crear()" [disabled]="creando">
        @if (creando) {
          <ion-spinner name="crescent" slot="start"></ion-spinner>
          Creando...
        } @else {
          Crear negocio
        }
      </ion-button>
    </div>

  </form>

</div>
