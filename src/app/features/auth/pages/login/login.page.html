<ion-content [fullscreen]="true">
  <div class="login-container">
    <div class="auth-card">

      <div class="brand-section">
        <div class="logo-wrap">
          <img src="assets/icon/logo.png" alt="NexoPOS" class="logo-img" />
        </div>
        <h1>NexoPOS</h1>
        <p>Gestiona tu negocio fácil</p>
      </div>

      <div class="actions-section">
        <button class="google-btn" (click)="loginWithGoogle()" [disabled]="iniciando">
          @if (iniciando) {
            <span class="btn-spinner"></span>
          } @else {
            <ion-icon name="logo-google"></ion-icon>
          }
          <span class="btn-label">{{ iniciando ? 'Conectando...' : 'Continuar con Google' }}</span>
        </button>

        <p class="terms-text">
          Al continuar, aceptas nuestros <a href="#">Términos</a> y <a href="#">Política de Privacidad</a>.
        </p>
      </div>

    </div>
  </div>
</ion-content>
