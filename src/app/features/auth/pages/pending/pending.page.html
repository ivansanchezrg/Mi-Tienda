<ion-content [fullscreen]="true">
  <div class="pending-container">
    <div class="auth-card">

      <div class="pending-icon-wrap">
        <ion-icon name="time-outline"></ion-icon>
      </div>

      <h1>Cuenta desactivada</h1>
      <p class="pending-message">
        Tu acceso fue desactivado por el administrador.<br>
        Contactalo para que te reactive.
      </p>

      <div class="pending-actions">
        <ion-button expand="block" (click)="reintentar()" [disabled]="verificando">
          <ion-icon slot="start" name="refresh-outline"></ion-icon>
          {{ verificando ? 'Verificando...' : 'Verificar estado' }}
        </ion-button>

        <ion-button expand="block" fill="clear" color="medium" (click)="cerrarSesion()">
          <ion-icon slot="start" name="log-out-outline"></ion-icon>
          Salir
        </ion-button>
      </div>

    </div>
  </div>
</ion-content>
