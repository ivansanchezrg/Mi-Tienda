<div class="bs-root">

  <!-- Header -->
  <div class="bs-header">
    <div class="bs-header__icon">
      <ion-icon name="create-outline"></ion-icon>
    </div>
    <span class="bs-header__title">Nueva nota</span>
    <button class="bs-header__close" (click)="cancelar()" type="button">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="bs-content">
    <div class="bs-body">

      <!-- Textarea -->
      <div class="textarea-section">
        <textarea
          class="nota-textarea"
          [(ngModel)]="texto"
          (keydown)="onKeydown($event)"
          placeholder="Escribe la nota aquí..."
          [maxlength]="MAX"
          rows="5"
          autocomplete="off"
          autocorrect="off"
          spellcheck="true">
        </textarea>
        <span class="char-count" [class.char-count--warn]="restantes <= 50">
          {{ restantes }} caracteres restantes
        </span>
      </div>

    </div>
  </div>

  <!-- Botones -->
  <div class="bs-actions bs-actions--row">
    <ion-button expand="block" fill="outline" color="medium" (click)="cancelar()">Salir</ion-button>
    <ion-button expand="block" fill="solid" color="secondary" (click)="guardar()" [disabled]="!valido">Guardar</ion-button>
  </div>

</div>
