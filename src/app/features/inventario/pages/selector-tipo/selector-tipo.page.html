<ion-header class="ion-no-border">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-button (click)="volver()">
                <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Crear producto</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content color="light">
    <div class="selector-container">

        <p class="selector-subtitle">Selecciona el tipo de producto que quieres crear</p>

        <!-- Opcion: Producto simple -->
        <button class="tipo-card" (click)="irProductoSimple()">
            <div class="tipo-card-icon tipo-card-icon--simple">
                <ion-icon name="cube-outline"></ion-icon>
            </div>
            <div class="tipo-card-body">
                <span class="tipo-card-title">Producto simple</span>
                <span class="tipo-card-desc">Un solo producto con su precio, stock y presentaciones opcionales (ej: cajetilla, pack).</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="tipo-card-arrow"></ion-icon>
        </button>

        <!-- Opcion: Producto con variantes -->
        <button class="tipo-card" (click)="irProductoVariantes()">
            <div class="tipo-card-icon tipo-card-icon--variantes">
                <ion-icon name="color-palette-outline"></ion-icon>
            </div>
            <div class="tipo-card-body">
                <span class="tipo-card-title">Producto con variantes</span>
                <span class="tipo-card-desc">Un producto con diferentes opciones como sabor, color o talla. Cada combinacion tiene su propio precio y stock.</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="tipo-card-arrow"></ion-icon>
        </button>

    </div>
</ion-content>
