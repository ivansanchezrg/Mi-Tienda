<ion-split-pane contentId="main-content" when="lg">

  <!-- Sidebar (overlay en móvil, fijo en desktop — ion-split-pane maneja el tipo automáticamente) -->
  <ion-menu contentId="main-content">
    <app-sidebar (accionRapida)="onAccionRapida($event)"></app-sidebar>
  </ion-menu>

  <!-- Wrapper principal — ion-split-pane lo identifica por id, ion-tabs maneja el routing interno -->
  <div id="main-content" class="main-content-wrapper">
  <ion-tabs>

    <!-- Overlay oscuro del FAB -->
    @if (showTabs && fabAbierto) {
    <div class="fab-overlay" (click)="toggleFab()"></div>
    }

    <!-- Opciones del FAB -->
    @if (showTabs && fabAbierto) {
    <div class="fab-options">
      <div class="fab-option" (click)="abrirCalculadora()">
        <div class="fab-option-icon success">
          <ion-icon [icon]="calculatorIcon"></ion-icon>
        </div>
        <span class="fab-option-label">Calc. Margen</span>
      </div>
      <div class="fab-option" (click)="nuevaNota()">
        <div class="fab-option-icon secondary">
          <ion-icon [icon]="createIcon"></ion-icon>
        </div>
        <span class="fab-option-label">Nueva nota</span>
      </div>
      <div class="fab-option" (click)="irACuadre()">
        <div class="fab-option-icon tertiary">
          <ion-icon [icon]="scaleIcon"></ion-icon>
        </div>
        <span class="fab-option-label">Cuadre</span>
      </div>
    </div>
    }

    <!--
      ion-tab-bar siempre en el DOM para que ion-tabs mantenga
      la tab activa al volver de páginas secundarias.
      Se oculta con CSS en desktop y cuando tabs están ocultos.
    -->
    <ion-tab-bar slot="bottom" [class.tabs-oculto]="!showTabs">
      <ion-tab-button tab="home">
        <ion-icon [icon]="homeIcon"></ion-icon>
        <ion-label>Inicio</ion-label>
      </ion-tab-button>

      @if (posHabilitado) {
      <ion-tab-button tab="pos">
        <ion-icon [icon]="posIcon"></ion-icon>
        <ion-label>POS</ion-label>
      </ion-tab-button>
      } @else {
      <app-disabled-tab [icon]="posIcon" label="POS"></app-disabled-tab>
      }

      <!-- FAB integrado como tab -->
      <ion-tab-button class="fab-tab-container">
        <ion-fab-button color="dark" (click)="toggleFab()" [class.fab-abierto]="fabAbierto">
          <ion-icon [icon]="fabAbierto ? closeIcon : addIcon"></ion-icon>
        </ion-fab-button>
      </ion-tab-button>

      <ion-tab-button tab="inventario">
        <ion-icon [icon]="inventarioIcon"></ion-icon>
        <ion-label>Inventario</ion-label>
      </ion-tab-button>

      @if (posHabilitado) {
      <ion-tab-button tab="ventas">
        <ion-icon [icon]="ventasIcon"></ion-icon>
        <ion-label>Ventas</ion-label>
      </ion-tab-button>
      } @else {
      <app-disabled-tab [icon]="ventasIcon" label="Ventas"></app-disabled-tab>
      }
    </ion-tab-bar>

  </ion-tabs>
  </div>

</ion-split-pane>
