<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Cobros y Pagos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="hub-container">

    <p class="hub-hint">Selecciona una opción para gestionar</p>

    <!-- Grid 2 columnas: Créditos + Empleados -->
    <div class="hub-grid">

      <button class="hub-card" (click)="navegar(items[0].ruta)">
        <div class="hub-card-icon icon-warning">
          <ion-icon name="receipt-outline"></ion-icon>
        </div>
        <span class="hub-card-titulo">Créditos</span>
        <span class="hub-card-sub">Ventas fiadas por cobrar</span>
      </button>

      <button class="hub-card" (click)="navegar(items[1].ruta)">
        <div class="hub-card-icon icon-primary">
          <ion-icon name="wallet-outline"></ion-icon>
        </div>
        <span class="hub-card-titulo">Empleados</span>
        <span class="hub-card-sub">Adelantos y nómina</span>
      </button>

    </div>

    <!-- Proveedores full-width deshabilitado -->
    <div class="hub-card hub-card--full hub-card--disabled">
      <div class="hub-card-icon icon-medium">
        <ion-icon name="storefront-outline"></ion-icon>
      </div>
      <div class="hub-card-full-body">
        <span class="hub-card-titulo">Proveedores</span>
        <span class="hub-card-sub">Compras a crédito pendientes de pago</span>
      </div>
      <span class="prox-badge">Disponible pronto</span>
    </div>

  </div>

</ion-content>
